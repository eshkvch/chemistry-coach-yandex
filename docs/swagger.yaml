basePath: /api/v1
definitions:
  github_com_elfrida_chemistry-coach_internal_domain.DailyExercise:
    properties:
      criterion:
        type: string
      description:
        type: string
      title:
        type: string
    type: object
  github_com_elfrida_chemistry-coach_internal_domain.DebriefScores:
    properties:
      balance:
        $ref: '#/definitions/github_com_elfrida_chemistry-coach_internal_domain.ScoreDetail'
      clarity:
        $ref: '#/definitions/github_com_elfrida_chemistry-coach_internal_domain.ScoreDetail'
      confidence:
        $ref: '#/definitions/github_com_elfrida_chemistry-coach_internal_domain.ScoreDetail'
      respect:
        $ref: '#/definitions/github_com_elfrida_chemistry-coach_internal_domain.ScoreDetail'
    type: object
  github_com_elfrida_chemistry-coach_internal_domain.ImprovedReply:
    properties:
      improved:
        type: string
      original:
        type: string
      reason:
        type: string
    type: object
  github_com_elfrida_chemistry-coach_internal_domain.RiskFlag:
    properties:
      explanation:
        type: string
      quote:
        type: string
      severity:
        type: string
      suggestion:
        type: string
    type: object
  github_com_elfrida_chemistry-coach_internal_domain.ScoreDetail:
    properties:
      comment:
        type: string
      value:
        type: integer
    type: object
  github_com_elfrida_chemistry-coach_internal_domain.SkillScores:
    properties:
