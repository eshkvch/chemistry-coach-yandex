      clarity:
        type: integer
      confidence:
        type: integer
      respect:
        type: integer
    type: object
  github_com_elfrida_chemistry-coach_internal_usecase.AuthStartInput:
    properties:
      birthYear:
        type: integer
      consents:
        properties:
          agreesToRules:
            type: boolean
          isAdult:
            type: boolean
          understandsAI:
            type: boolean
        type: object
      userID:
        description: 'optional: return existing'
